<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nvoip Web SDK | Exemplo sem backend</title>
    <link rel="stylesheet" href="../dist/nvoip-auth-widget.css?v=0.2.3" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 12% 16%, rgba(0, 163, 224, 0.18), transparent 30%),
          radial-gradient(circle at 84% 16%, rgba(255, 131, 0, 0.14), transparent 28%),
          #f8fafc;
        color: #10131a;
        font-family: "Plus Jakarta Sans", "Manrope", "Aptos", "Segoe UI", sans-serif;
      }

      main {
        width: min(1040px, 100%);
        display: grid;
        grid-template-columns: 0.9fr 1.1fr;
        gap: 28px;
        align-items: center;
      }

      .copy {
        padding: 24px;
      }

      .copy p:first-child {
        margin: 0 0 14px;
        color: #006bb6;
        font-size: 13px;
        font-weight: 850;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(38px, 5.2vw, 66px);
        font-weight: 800;
        letter-spacing: -0.045em;
        line-height: 1.03;
      }

      .copy p:last-child {
        max-width: 480px;
        color: #475569;
        font-size: 17px;
        font-weight: 550;
        line-height: 1.58;
      }

      .card {
        padding: 30px;
        border: 1px solid #e2e8f0;
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 28px 78px rgba(15, 23, 42, 0.12);
      }

      .actions {
        display: grid;
        gap: 12px;
      }

      button {
        border: 0;
        border-radius: 16px;
        padding: 15px 18px;
        background: #ff8300;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-size: 15px;
        font-weight: 850;
      }

      button.secondary {
        background: #eef6ff;
        color: #1d4ed8;
      }

      .hint,
      .status {
        margin-top: 16px;
        color: #64748b;
        font-size: 14px;
        font-weight: 750;
      }

      .status {
        min-height: 22px;
        color: #15803d;
      }

      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="copy">
        <p>Nvoip Web SDK</p>
        <h1>Fluxo pronto para login e validação de telefone.</h1>
        <p>
          Este exemplo não chama a API real. Ele mostra como o SDK fica na aplicação do cliente e usa o código
          <strong>123456</strong> para simular a validação.
        </p>
      </section>

      <section class="card">
        <div class="actions">
          <button id="mock-2fa" type="button">Simular 2FA após login</button>
          <button id="mock-otp" class="secondary" type="button">Simular OTP de telefone</button>
        </div>
        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div class="hint">Código para teste local: <strong>123456</strong></div>
      </section>
    </main>

    <script src="../dist/nvoip-auth-widget.js?v=0.2.3"></script>
    <script>
      const status = document.getElementById("status");

      function mockCallbacks(flow) {
        return {
          channels: ["whatsapp", "sms", "voice"],
          phone: "5511999999999",
          returnTo: window.location.href,
          redirectOnSuccess: false,
          closeOnSuccess: false,
          async startVerification({ channel }) {
            status.textContent = "";
            return {
              sessionId: "mock-" + flow + "-" + channel,
              message: "Código enviado. Use 123456 para validar este exemplo.",
            };
          },
          async confirmVerification({ code }) {
            if (code !== "123456") {
              throw new Error("Código inválido. Use 123456 neste exemplo local.");
            }
            return { status: "ok" };
          },
          onSuccess({ flow, channel }) {
            status.textContent = flow.toUpperCase() + " validado por " + channel + ".";
            return false;
          },
        };
      }

      document.getElementById("mock-2fa").addEventListener("click", () => {
        NvoipAuthWidget.start2FA({
          ...mockCallbacks("2fa"),
          accountLabel: "cliente@nvoip.com.br",
          maskedPhone: "terminado em 9999",
        });
      });

      document.getElementById("mock-otp").addEventListener("click", () => {
        NvoipAuthWidget.startOTP(mockCallbacks("otp"));
      });
    </script>
  </body>
</html>
