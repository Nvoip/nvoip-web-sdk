name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node --check dist/nvoip-auth-widget.js
      - run: node --check examples/server-node.mjs
      - run: npm pack --dry-run
